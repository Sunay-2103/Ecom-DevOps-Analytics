version: "3.9"

services:

  # ─── PostgreSQL Database ───────────────────────────────
  database:
    image: postgres:15-alpine
    container_name: ecom_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_pass
      POSTGRES_DB: ecom_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # avoid local conflict
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecom_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ecom_user:ecom_pass@database:5432/ecom_db
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ─── React Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecom_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:change 25
change 19
change 6
