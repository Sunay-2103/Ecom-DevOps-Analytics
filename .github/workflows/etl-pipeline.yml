# ============================================================
# Scheduled ETL Pipeline — E-Commerce DevOps Analytics
# ============================================================
# Runs every day at 02:00 UTC to refresh Tableau CSV exports.
# Can also be triggered manually from the GitHub Actions UI.
#
# This workflow:
#   1. Spins up PostgreSQL + seeds data
#   2. Runs the ETL Python script
#   3. Uploads the generated CSVs as a GitHub Actions artifact
# ============================================================

name: Scheduled ETL — Tableau Export

on:
  # Run every day at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual ETL run"
        required: false
        default: "Manual trigger"

jobs:
  etl-export:
    name: Run Tableau ETL Export
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ecom_user
          POSTGRES_PASSWORD: ecom_pass
          POSTGRES_DB: ecom_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecom_user -d ecom_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Set up Python ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            etl/requirements.txt

      # ── Install backend dependencies (for seeding) ─────────
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # ── Create database tables + seed data ─────────────────
      - name: Create tables and seed database
        env:
          DATABASE_URL: postgresql://ecom_user:ecom_pass@localhost:5432/ecom_db
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          python -c "
          from app.database import engine, Base
          from app.models.models import User, Product, Order
          Base.metadata.create_all(bind=engine)
          print('Tables created.')
          "
          python seed_data.py

      # ── Install ETL dependencies ──────────────────────────
      - name: Install ETL dependencies
        run: |
          cd etl
          pip install -r requirements.txt

      # ── Run the ETL script ────────────────────────────────
      - name: Run Tableau ETL export
        env:
          DATABASE_URL: postgresql://ecom_user:ecom_pass@localhost:5432/ecom_db
          ETL_OUTPUT_DIR: ${{ github.workspace }}/exports
        run: |
          mkdir -p ${{ github.workspace }}/exports
          python etl/tableau_etl.py

      # ── List generated files ──────────────────────────────
      - name: List exported CSV files
        run: ls -lh ${{ github.workspace }}/exports/

      # ── Upload CSVs as GitHub Actions artifact ─────────────
      # These can be downloaded from the Actions run summary page.
      # Retained for 30 days.
      - name: Upload Tableau CSV exports
        uses: actions/upload-artifact@v4
        with:
          name: tableau-exports-${{ github.run_number }}
          path: ${{ github.workspace }}/exports/*_latest.csv
          retention-days: 30
